<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Google Clone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="nav">
    <div class="nav-right">
      <a href="#">Gmail</a>
      <a href="#">Images</a>
      <img src="https://cdn-icons-png.flaticon.com/512/709/709496.png" class="icon" />
      <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" class="avatar" />
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">
    <img 
      src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" 
      alt="Google Logo" 
      class="logo"
    />

    <!-- SEARCH -->
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Search Google or type a URL"/>
      <span class="mic-icon">🎤</span>
    </div>

    <!-- BUTTONS -->
    <div class="buttons">
      <button>Google Search</button>
      <button>I'm Feeling Lucky</button>
    </div>

    <!-- LANGUAGE -->
    <p class="lang">
      Google offered in: <a href="#">ქართული</a>
    </p>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-top">Georgia</div>
    <div class="footer-bottom">
      <div>
        <a href="#">About</a>
        <a href="#">Advertising</a>
        <a href="#">Business</a>
      </div>
      <div>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Settings</a>
      </div>
    </div>
  </footer>

</body>
</html>
